name: testprojects

permissions:
  actions: read
  contents: read
  pull-requests: write
  security-events: write

on:
  pull_request:
    branches:
      - main

concurrency:
  group: testprojects-${{ github.ref }}
  cancel-in-progress: true

jobs:
  healthchecks:
    name: HealthChecks
    uses: ./.github/workflows/build-dotnet-dynamic.yml
    with:
      disableDependaMerge: true
      dotnetVersion: ${{ vars.NE_DOTNET_TARGETFRAMEWORKS }}
      enableCleanUpDockerDocker: true
      script-path: ./testprojects/healthchecks/scripts/Collect-TestProjects.ps1
      solution: ./testprojects/healthchecks/HealthChecks.slnx
    secrets: inherit

  hostingwinforms:
    name: Hosting.WinForms
    uses: ./.github/workflows/build-dotnet-single.yml
    with:
      disableCodeFormat: true
      disableDependaMerge: true
      dotnetVersion: ${{ vars.NE_DOTNET_TARGETFRAMEWORKS }}
      enableCleanUpDockerDocker: true
      runsOnBuild: windows-latest
      solution: ./testprojects/hosting.winforms/Extensions.Hosting.WinForms.slnx
    secrets: inherit
