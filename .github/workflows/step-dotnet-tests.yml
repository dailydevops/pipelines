on:
  workflow_call:
    inputs:
      enableCleanUpDockerDocker:
        required: false
        type: boolean
        default: false
      disableCoverageUpload:
        required: false
        type: boolean
        default: false
      dotnet-logging:
        required: false
        type: string
        default: quiet
      dotnet-version:
        required: false
        type: string
        default: 8.x
      execution-name:
        required: false
        type: string
        default: default
      runs-on:
        required: false
        type: string
        default: ubuntu-latest
      solution:
        required: true
        type: string
      solution-version:
        required: true
        type: string
      test-filter:
        required: false
        type: string
        default: ''
      clear-dev-certs:
        required: false
        type: boolean
        default: false
    secrets:
      CODECOV_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  testing:
    name: Testing .NET solution
    runs-on: ${{ inputs.runs-on || 'ubuntu-latest' }}
    env:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: recursive
        token: ${{ secrets.FETCH_TOKEN || github.token }}

    # Our modules occupy too much disk space. The GitHub-hosted runners ran into the
    # error: "no space left on device." The pulled images are not cleaned up between
    # the test runs. One obvious approach is splitting the tests and running them on
    # multiple runners. However, we need to keep in mind that running too many
    # simultaneous builds has an impact on others as well. We observed that scheduled
    # Dependabot builds blocked others in the Testcontainers organization.
    - name: Free Disk Space - Docker Images
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      if: ${{ inputs.enableCleanUpDockerDocker == true && runner.os == 'Linux' }}
      with:
        android: true
        haskell: true
        dotnet: false
        large-packages: false
        tool-cache: false
        swap-storage: true
        docker-images: true

    - name: Resize swapfile (Linux only)
      if: ${{ runner.os == 'Linux' }}
      run: |
        sudo swapoff -a
        sudo fallocate -l 6G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        sudo swapon --show

    - name: Install linux-dev-certs (Linux only)
      if: ${{ inputs.clear-dev-certs && runner.os == 'Linux' }}
      run: |
        dotnet tool update -g linux-dev-certs
        dotnet linux-dev-certs install

    - name: Clear and trust .NET dev certs
      if: ${{ inputs.clear-dev-certs }}
      run: |
        dotnet dev-certs https --clean
        dotnet dev-certs https --trust

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: ${{ inputs.dotnet-version }}
        global-json-file: ./global.json

    - name: Restore dependencies
      run: dotnet restore ${{ inputs.solution }} -v ${{ inputs.dotnet-logging }}

    - name: Build
      run: dotnet build ${{ inputs.solution }} -c Release -v ${{ inputs.dotnet-logging || 'minimal' }} --no-restore /p:GeneratePackageOnBuild=false /p:Version=${{ inputs.solution-version }}

    - name: Test
      id: test
      env:
        TUNIT_DISABLE_GITHUB_REPORTER: true
      run: |
        dotnet test  --solution ${{ inputs.solution }}  -c Release  -v ${{ inputs.dotnet-logging || 'minimal' }}  --no-build --no-restore /p:Version=${{ inputs.solution-version }} --results-directory ./TestResults --ignore-exit-code 8 ${{ inputs.test-filter != '' && format('--treenode-filter "{0}"', inputs.test-filter) || ''}} --no-progress -- --coverage --coverage-output-format cobertura

    - name: ReportGenerator
      uses: danielpalme/ReportGenerator-GitHub-Action@ee3806a36b8b2eb9594cb3e5fae045af7e5ead10 # v5.5.6
      with:
        reports: '${{ github.workspace }}/TestResults/**/*.cobertura.xml'
        targetdir: '${{ github.workspace }}/coveragereports'
        reporttypes: 'Cobertura;MarkdownSummaryGithub'

    - name: Upload coverage into summary
      # Only on non windows runners
      if: ${{ runner.os != 'Windows' }}
      run: |
        cat $GITHUB_WORKSPACE/coveragereports/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

    - name: Update codecov
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      if: ${{ env.codecov_token != '' && (success() || steps.test.conclusion == 'failure') }}
      with:
        token: ${{ env.codecov_token }}
        fail_ci_if_error: true
        files: ${{ github.workspace }}/coveragereports/Cobertura.xml

    - name: Upload Coverage Reports
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{ inputs.disableCoverageUpload == false }}
      with:
        name: coverage-${{ inputs.runs-on || 'ubuntu-latest' }}-${{ hashFiles(inputs.solution) }}-${{ inputs.execution-name }}
        retention-days: 3
        path: |
          **/TestResults/**/*.opencover.xml
          **/TestResults/**/*.cobertura.xml

    - name: Upload log files
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{ failure() }}
      with:
        name: logs-${{ inputs.runs-on || 'ubuntu-latest' }}-${{ hashFiles(inputs.solution) }}-${{ inputs.execution-name }}
        if-no-files-found: ignore
        retention-days: 3
        path: |
          **/TestResults/**/*.log
          **/*.sarif
